<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GUILTY. screen saver</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    .screensaver-spline-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #ffffff;
      transform: translateY(-20px);
    }

    .screensaver-spline-canvas {
      position: absolute;
      inset: 0;
      transform-origin: center center;
    }

    .screensaver-spline-canvas > spline-viewer {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
    }

    .logo {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .logo img {
      display: block;
      width: min(55vw, 720px);
      height: auto;
      transform: scale(0.63);
    }
  </style>
</head>
<body>
  <div class="screensaver-spline-stage">
    <div class="screensaver-spline-canvas">
      <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.98/build/spline-viewer.js"></script>
      <spline-viewer url="https://prod.spline.design/rsfPu2JeNnTqiQck/scene.splinecode"></spline-viewer>
    </div>
  </div>

  <div class="logo">
    <img src="Group wordmark.svg" alt="GUILTY">
  </div>

  <script src="screensaver-spline.js"></script>
</body>
</html>
